version: v2
plugins:
  - local: ../webui/ui/node_modules/.bin/protoc-gen-ts_proto
    out: ../webui/ui/src/lib/proto
    opt:
      - outputEncodeMethods=true
      - outputJsonMethods=false
      - outputClientImpl=false
      - outputServices=false
      - useOptionals=messages
      - env=browser
