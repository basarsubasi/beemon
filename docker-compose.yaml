services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    privileged: true
    pid: host
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    ports:
      - "6060:6060"
    environment:
      - BEEMON_LOG_LEVEL=warn
      - BEEMON_EVENT_LIMIT=150
    restart: unless-stopped

  bff:
    build:
      context: .
      dockerfile: Dockerfile.bff
    environment:
      - BEEMON_GRPC_ENDPOINT=daemon:50051
    depends_on:
      - daemon
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "${BEEMON_UI_PORT:-3000}:80"
    depends_on:
      - bff
    restart: unless-stopped
